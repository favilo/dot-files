- name: Check if zsh is installed
  command: dpkg-query -W -f='${Status}' zsh
  register: zsh_check
  ignore_errors: true
  changed_when: false
  become: false
  check_mode: no

- name: Report zsh installation status (Check Mode Only)
  debug:
    msg: "zsh is missing and would be installed"
  when: ansible_check_mode and zsh_check.rc is defined and zsh_check.rc != 0

- name: Install zsh
  apt:
    name:
      - zsh
  become_method: sudo
  become: true
  when: not ansible_check_mode and zsh_check.rc is defined and zsh_check.rc != 0
