- name: Check if git is installed
  command: dpkg-query -W -f='${Status}' git
  register: git_check
  ignore_errors: true
  changed_when: false
  become: false
  check_mode: no

- name: Report git installation status (Check Mode Only)
  debug:
    msg: "git is missing and would be installed"
  when: ansible_check_mode and git_check.rc is defined and git_check.rc != 0

- name: Install git with apt
  apt:
    name: git
    state: present
  become_method: sudo
  become: true
  when: not ansible_check_mode and git_check.rc is defined and git_check.rc != 0
