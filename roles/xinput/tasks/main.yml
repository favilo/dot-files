- name: Ensure ~/.local/bin directory exists
  file:
    path: "{{ dotfiles_user_home }}/.local/bin"
    state: directory
    mode: "0755"

- name: Link touchpad fix script to ~/.local/bin
  file:
    src: "{{ dotfiles_home }}/roles/xinput/files/fix-touchpad.sh"
    dest: "{{ dotfiles_user_home }}/.local/bin/fix-touchpad"
    state: link
    force: true
