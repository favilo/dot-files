- name: Check if fzf is installed
  command: dpkg-query -W -f='${Status}' fzf
  register: fzf_check
  ignore_errors: true
  changed_when: false
  become: false
  check_mode: no

- name: Report fzf installation status (Check Mode Only)
  debug:
    msg: "fzf is missing and would be installed"
  when: ansible_check_mode and fzf_check.rc is defined and fzf_check.rc != 0

- name: Install fzf from apt
  apt:
    name: fzf
    state: present
  become: true
  become_method: sudo
  when: not ansible_check_mode and fzf_check.rc is defined and fzf_check.rc != 0
