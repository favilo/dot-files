- name: Install jj with cargo-binstall
  command: "{{ dotfiles_user_home }}/.cargo/bin/cargo-binstall -y --strategies crate-meta-data jj-cli"
  args:
    creates: "{{ dotfiles_user_home }}/.cargo/bin/jj"
  when: not ansible_check_mode

- name: Create jj config directory
  file:
    state: directory
    dest: "{{ xdg_config_home }}/jj"

- name: Hard link jj config.toml
  file:
    src: "{{ dotfiles_home }}/roles/jj/files/config.toml"
    dest: "{{ xdg_config_home }}/jj/config.toml"
    state: hard
    force: true
