- name: Install podman repo
  template:
    src: "devel:kubic:libcontainers:stable.list.j2"
    dest: "/etc/apt/sources.list.d/devel:kubic:libcontainers:stable.list"
  become: true
  become_method: sudo
  when: ansible_distribution_version == "20.04"

- name: Install podman apt-key
  apt_key:
    url: "https://download.opensuse.org/repositories/devel:kubic:libcontainers:stable/xUbuntu_{{ ansible_distribution_version }}/Release.key"
    state: present
  become: true
  become_method: sudo
  when: ansible_distribution_version == "20.04"

- name: Install apt packages
  apt:
    name:
      - aptitude
      - qemu
      - qemu-system
      - nodejs
      - npm
      - sddm
      - flameshot
      - runc
      - podman
      - autorandr
      - arandr
      - steam-installer
      - pavucontrol
      - openjdk-8-jdk
      - net-tools
      - pcmanfm
      - imagemagick
    state: present
    update_cache: true
  become_method: sudo
  become: true

- name: Install snap packages (classic confinement)
  snap:
    name:
      - slack
      - helm
      - kubectl
    state: present
    classic: true
  become: true
  become_method: sudo

- name: Remove multimc
  apt:
    name: multimc
    state: absent
  become: true
  become_method: sudo

- name: Install Prism Launcher via Flatpak
  community.general.flatpak:
    name: org.prismlauncher.PrismLauncher
    state: present
