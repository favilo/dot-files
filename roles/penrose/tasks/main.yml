- include_tasks: debian.yml
  when: ansible_os_family == "Debian"

- name: Fetch penrose (favilrose) git repo
  git:
    repo: https://github.com/favilo/favilrose
    dest: "{{ dotfiles_user_home }}/git/utilities/favilrose"
  when: not ansible_check_mode

- name: Build favilrose (release)
  command: make build
  args:
    chdir: "{{ dotfiles_user_home }}/git/utilities/favilrose"
    creates: "{{ dotfiles_user_home }}/git/utilities/favilrose/target/release/favilo-penrose"
  when: not ansible_check_mode

# `make install` copies the binary, bin/ + scripts/ helpers, systemd units, and
# the repo's own penrose.desktop into /usr/local and /usr — all need root.
- name: Install favilrose
  command: make install
  args:
    chdir: "{{ dotfiles_user_home }}/git/utilities/favilrose"
    creates: "/usr/local/bin/favilo-penrose"
  become: true
  become_method: sudo
  when: not ansible_check_mode

- name: Create polybar config directory
  file:
    path: "{{ xdg_config_home }}/polybar"
    state: directory

- name: polybar config
  file:
    src: "{{ dotfiles_home }}/roles/penrose/files/config/polybar/{{ item.src }}"
    dest: "{{ xdg_config_home }}/polybar/{{ item.src }}"
    state: link
    force: true
  with_items:
    - src: launch.sh
    - src: config
