- name: Check which penrose packages are missing
  command: "dpkg-query -W -f='${Package} installed\\n' {{ penrose_packages | join(' ') }}"
  register: penrose_check
  ignore_errors: true
  changed_when: false
  become: false
  check_mode: no
  vars:
    penrose_packages: &penrose_pkgs
      - libglib2.0-dev
      - libpango1.0-dev
      - libcairo2-dev
      - libasound2-dev
      - libgirepository1.0-dev
      - libxcb-randr0-dev
      - libwebkit2gtk-4.1-dev
      - libgtksourceview-3.0-dev
      - libtinfo-dev
      - libdbusmenu-glib-dev
      - libdbusmenu-gtk3-dev
      - thunar
      - suckless-tools
      - xsecurelock
      - polybar
      - blueman
      - nitrogen
      - picom
      - rofi
      - dunst
      - jq
      - tint2

- name: Set missing penrose packages fact
  set_fact:
    missing_penrose_packages: "{{ penrose_packages | difference((penrose_check.stdout_lines | default([])) | map('regex_replace', ' installed$', '') | list) }}"
  vars:
    penrose_packages: *penrose_pkgs

- name: Report missing penrose packages (Check Mode Only)
  debug:
    msg: "The following penrose packages are missing and would be installed: {{ missing_penrose_packages }}"
  when: ansible_check_mode and missing_penrose_packages | length > 0

- name: Install penrose dependencies
  apt:
    name: "{{ missing_penrose_packages }}"
    state: present
    force_apt_get: yes
  become: true
  become_method: sudo
  when: not ansible_check_mode and missing_penrose_packages | length > 0
