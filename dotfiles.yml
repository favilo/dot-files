- name: Local Bookkeeping tasks
  hosts: local
  tasks: []

- name: Debug values
  hosts: local
  tasks:
    - debug:
        var: ansible_os_family
        verbosity: 1
      tags:
        - "git"
        - "fzf"
        - "zsh"
        - "zellij"
        # - "emacs"
        # - "doom-emacs"
        - "nvim"
        - "rust"
        # - "wm"
        - "packages"
        - "xinput"

- name: Set up local development environment
  hosts: local
  roles:
    - role: git
      tags:
        - "git"
    # - {role: fish, tags: ['fish']}
    - role: fzf
      tags:
        - "fzf"
    - role: zsh
      tags:
        - "zsh"
    - role: zellij
      tags:
        - "zellij"
    - role: nvim
      tags:
        - "nvim"
    # - role: haskell
    #   tags:
    #     - "stack"
    - role: programming
      tags:
        - "rustup"
        - "cargo"
        - "rust"
        - "go"
        - "programming"
    - role: penrose
      tags:
        - "wm"
        - "penrose"
    - role: firefox
      tags:
        - firefox
    - role: packages
      tags:
        - "packages"
    - role: jj
      tags:
        - "jj"
    - role: xinput
      tags:
        - "xinput"
